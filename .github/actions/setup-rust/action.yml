name: Setup pinned Rust
description: Install the Rust toolchain pinned by rust-toolchain.toml.

inputs:
  targets:
    description: Comma-separated Rust targets to install.
    required: false
    default: ""

outputs:
  toolchain:
    description: Rust toolchain channel installed by this action.
    value: ${{ steps.toolchain.outputs.toolchain }}

runs:
  using: composite
  steps:
    - name: Install pinned Rust
      shell: bash
      run: rustup toolchain install --no-self-update

    - name: Install Rust targets
      if: inputs.targets != ''
      shell: bash
      env:
        RUST_TARGETS: ${{ inputs.targets }}
      run: |
        set -euo pipefail
        IFS=',' read -ra targets <<< "${RUST_TARGETS}"
        rustup target add "${targets[@]}"

    - name: Resolve active toolchain
      id: toolchain
      shell: bash
      run: |
        set -euo pipefail
        toolchain="$(rustup show active-toolchain | awk '{ print $1 }')"
        if [ -z "${toolchain}" ]; then
          echo "rustup did not report an active toolchain." >&2
          exit 1
        fi
        echo "toolchain=${toolchain}" >> "${GITHUB_OUTPUT}"
