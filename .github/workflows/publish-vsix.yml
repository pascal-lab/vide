name: Publish VSIX artifacts

on:
  workflow_call:
    inputs:
      plan:
        required: true
        type: string

permissions:
  contents: write

jobs:
  upload-github-release:
    name: Upload VSIX files to GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Download VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          path: artifacts
          merge-multiple: true

      - name: Upload VSIX files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PLAN: ${{ inputs.plan }}
        shell: bash
        run: |
          set -euo pipefail
          tag="$(jq -r '.announcement_tag' <<< "$PLAN")"
          shopt -s nullglob
          vsixes=(artifacts/*.vsix)
          if (( ${#vsixes[@]} == 0 )); then
            echo "No VSIX artifacts found." >&2
            exit 1
          fi
          gh release upload "$tag" "${vsixes[@]}" --clobber

  publish-marketplaces:
    name: Publish VS Code marketplaces
    if: ${{ !fromJson(inputs.plan).announcement_is_prerelease }}
    needs: upload-github-release
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install JS dependencies
        run: npm ci

      - name: Download VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          path: artifacts
          merge-multiple: true

      - name: Publish VSIX packages to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${VSCE_PAT:-}" ]]; then
            echo "VSCE_PAT secret is not set; cannot publish to VS Code Marketplace." >&2
            exit 1
          fi
          shopt -s nullglob
          vsixes=(../../artifacts/*.vsix)
          if (( ${#vsixes[@]} == 0 )); then
            echo "No VSIX artifacts found to publish." >&2
            exit 1
          fi
          for vsix in "${vsixes[@]}"; do
            echo "::group::Publish $(basename "$vsix") to VS Code Marketplace"
            node node_modules/@vscode/vsce/vsce publish --packagePath "$vsix"
            echo "::endgroup::"
          done

      - name: Publish VSIX packages to Open VSX
        env:
          OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${OPEN_VSX_TOKEN:-}" ]]; then
            echo "OPEN_VSX_TOKEN secret is not set; cannot publish to Open VSX." >&2
            exit 1
          fi
          shopt -s nullglob
          vsixes=(../../artifacts/*.vsix)
          if (( ${#vsixes[@]} == 0 )); then
            echo "No VSIX artifacts found to publish." >&2
            exit 1
          fi
          for vsix in "${vsixes[@]}"; do
            echo "::group::Publish $(basename "$vsix") to Open VSX"
            npx --yes ovsx publish "$vsix" -p "$OPEN_VSX_TOKEN"
            echo "::endgroup::"
          done
