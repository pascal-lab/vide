name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && 'beta' || github.ref }}
  cancel-in-progress: false

env:
  EMSDK_VERSION: 5.0.2

jobs:
  changelog:
    name: Check changelog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && vars.SKIP_CHANGELOG_CHECK != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install docs dependencies
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && vars.SKIP_CHANGELOG_CHECK != 'true'
        run: npm --prefix docs ci

      - name: Require changelog entry for release tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && vars.SKIP_CHANGELOG_CHECK != 'true'
        run: node docs/scripts/release-body-from-changelog.mjs --tag "$GITHUB_REF_NAME" --output "$RUNNER_TEMP/release-body.md"

      - name: Skip changelog check for beta release
        if: github.event_name == 'workflow_dispatch'
        run: echo "Beta releases do not require a versioned changelog entry."

      - name: Skip changelog check by repository variable
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && vars.SKIP_CHANGELOG_CHECK == 'true'
        run: echo "SKIP_CHANGELOG_CHECK=true; skipping release changelog validation."

  build-and-package:
    name: Package ${{ matrix.target }}
    needs: changelog
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: windows-latest
            target: win32-x64
          - os: macos-15
            target: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt

      - name: Setup sccache
        uses: ./.github/actions/setup-sccache
        with:
          cmake-launcher: "true"

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          shared-key: rust-${{ runner.os }}
          key: package-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'build.rs', 'rust-toolchain.toml', 'src/**', 'crates/**', 'xtask/**') }}
          cache-workspace-crates: true
          cache-on-failure: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          shared-key: rust-${{ runner.os }}
          key: package-linux-x64-prebuilt-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'build.rs', 'rust-toolchain.toml', 'src/**', 'crates/**', 'xtask/**') }}
          cache-workspace-crates: true
          cache-on-failure: true

      - name: Install JS dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Set build metadata
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "VIDE_EXTENSION_BUILD_KIND=beta" >> "$GITHUB_ENV"
            echo "VIDE_EXTENSION_COMMIT_HASH=$(git rev-parse --short "$GITHUB_SHA")" >> "$GITHUB_ENV"
            echo "VIDE_EXTENSION_BUILD_DATE=$(date -u +'%Y%m%dT%H%M%SZ')" >> "$GITHUB_ENV"
          else
            echo "VIDE_EXTENSION_BUILD_KIND=stable" >> "$GITHUB_ENV"
          fi

      - name: Build VSIX
        working-directory: editors/vscode
        run: npm run package:vsix -- --target ${{ matrix.target }}

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vide-vscode-${{ github.event_name == 'workflow_dispatch' && 'beta' || 'stable' }}-${{ matrix.target }}
          path: editors/vscode/vide-vscode-${{ matrix.target }}.vsix
          if-no-files-found: error

      - name: Upload language server binary
        shell: bash
        run: |
          set -euo pipefail
          server_dir="editors/vscode/server/${{ matrix.target }}"
          if [[ "${{ matrix.target }}" == win32-* ]]; then
            src="${server_dir}/vide.exe"
            dst="vide-${{ matrix.target }}.exe"
          else
            src="${server_dir}/vide"
            dst="vide-${{ matrix.target }}"
          fi
          if [[ ! -f "$src" ]]; then
            echo "Language server binary not found: $src" >&2
            exit 1
          fi
          cp "$src" "$dst"
      - name: Upload language server binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: vide-lsp-${{ matrix.target }}
          path: vide-${{ matrix.target }}*
          if-no-files-found: error

  build-linux-x64-server:
    name: Build linux-x64 server
    needs: changelog
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and verify language server in manylinux2014
        shell: bash
        env:
          CARGO_TARGET_DIR: target/linux-x64-manylinux2014
        run: |
          set -euo pipefail
          build_script="${RUNNER_TEMP}/build-linux-x64-manylinux2014.sh"
          cat > "${build_script}" <<'BASH'
          set -euo pipefail

          yum install -y devtoolset-11-gcc devtoolset-11-gcc-c++ curl ca-certificates git
          git config --global --add safe.directory /workspace
          export PATH="/opt/python/cp312-cp312/bin:/opt/rh/devtoolset-11/root/usr/bin:${PATH}"

          toolchain="$(sed -n 's/^channel = "\(.*\)"/\1/p' rust-toolchain.toml)"
          if [ -z "${toolchain}" ]; then
            echo "rust-toolchain.toml does not define a toolchain channel." >&2
            exit 1
          fi
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain "${toolchain}"
          # shellcheck disable=SC1091
          source "${HOME}/.cargo/env"

          rustc --version
          cargo --version
          g++ -dumpfullversion -dumpversion
          cargo build --release

          server="${CARGO_TARGET_DIR}/release/vide"
          ldd --version
          ldd "$server"
          "$server" --version
          if readelf -V "$server" | grep -E 'Name: GLIBC_2\.([2-9][0-9]|1[89])\b|Name: GLIBCXX_3\.4\.([2-9][0-9]|1[0-9][0-9])\b|Name: CXXABI_1\.3\.([89]|[1-9][0-9])\b'; then
            echo "linux-x64 server requires symbols newer than the CentOS 7 baseline." >&2
            exit 1
          fi

          cp "$server" vide-linux-x64
          BASH

          docker run --rm \
            -e CARGO_TARGET_DIR="${CARGO_TARGET_DIR}" \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -v "${build_script}:/tmp/build-linux-x64-manylinux2014.sh:ro" \
            -w /workspace \
            quay.io/pypa/manylinux2014_x86_64 \
            /bin/bash /tmp/build-linux-x64-manylinux2014.sh

      - name: Upload language server binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: vide-lsp-linux-x64
          path: vide-linux-x64
          if-no-files-found: error

  build-linux-x64-package:
    name: Package linux-x64
    needs: build-linux-x64-server
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install JS dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Download language server artifact
        uses: actions/download-artifact@v4
        with:
          name: vide-lsp-linux-x64
          path: prebuilt-linux-x64

      - name: Stage language server
        run: |
          install -Dm755 prebuilt-linux-x64/vide-linux-x64 editors/vscode/server/linux-x64/vide

      - name: Set build metadata
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "VIDE_EXTENSION_BUILD_KIND=beta" >> "$GITHUB_ENV"
            echo "VIDE_EXTENSION_COMMIT_HASH=$(git rev-parse --short "$GITHUB_SHA")" >> "$GITHUB_ENV"
            echo "VIDE_EXTENSION_BUILD_DATE=$(date -u +'%Y%m%dT%H%M%SZ')" >> "$GITHUB_ENV"
          else
            echo "VIDE_EXTENSION_BUILD_KIND=stable" >> "$GITHUB_ENV"
          fi

      - name: Build VSIX
        working-directory: editors/vscode
        run: npm run package:vsix -- --target linux-x64 --server=prebuilt

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vide-vscode-${{ github.event_name == 'workflow_dispatch' && 'beta' || 'stable' }}-linux-x64
          path: editors/vscode/vide-vscode-linux-x64.vsix
          if-no-files-found: error

  build-alpine-package:
    name: Package ${{ matrix.target }}
    needs: changelog
    runs-on: ubuntu-22.04
    container: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: alpine-x64
            image: ghcr.io/blackdex/rust-musl:x86_64-musl-nightly
            rust-target: x86_64-unknown-linux-musl
          - target: alpine-arm64
            image: ghcr.io/blackdex/rust-musl:aarch64-musl-nightly
            rust-target: aarch64-unknown-linux-musl
    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends ca-certificates cmake git python3

      - name: Checkout
        uses: actions/checkout@v4

      - name: Trust checkout directories
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Setup Rust
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt
          targets: ${{ matrix.rust-target }}

      - name: Setup sccache
        uses: ./.github/actions/setup-sccache
        with:
          cmake-launcher: "true"

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          shared-key: rust-${{ runner.os }}-${{ matrix.target }}
          key: package-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'build.rs', 'rust-toolchain.toml', 'src/**', 'crates/**', 'xtask/**') }}
          cache-workspace-crates: true
          cache-on-failure: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install JS dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Set build metadata
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "VIDE_EXTENSION_BUILD_KIND=beta" >> "$GITHUB_ENV"
            echo "VIDE_EXTENSION_COMMIT_HASH=$(git rev-parse --short "$GITHUB_SHA")" >> "$GITHUB_ENV"
            echo "VIDE_EXTENSION_BUILD_DATE=$(date -u +'%Y%m%dT%H%M%SZ')" >> "$GITHUB_ENV"
          else
            echo "VIDE_EXTENSION_BUILD_KIND=stable" >> "$GITHUB_ENV"
          fi

      - name: Build VSIX
        working-directory: editors/vscode
        run: npm run package:vsix -- --target ${{ matrix.target }}

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vide-vscode-${{ github.event_name == 'workflow_dispatch' && 'beta' || 'stable' }}-${{ matrix.target }}
          path: editors/vscode/vide-vscode-${{ matrix.target }}.vsix
          if-no-files-found: error

      - name: Upload language server binary
        shell: bash
        run: |
          set -euo pipefail
          server_dir="editors/vscode/server/${{ matrix.target }}"
          src="${server_dir}/vide"
          dst="vide-${{ matrix.target }}"
          if [[ ! -f "$src" ]]; then
            echo "Language server binary not found: $src" >&2
            exit 1
          fi
          cp "$src" "$dst"
      - name: Upload language server binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: vide-lsp-${{ matrix.target }}
          path: vide-${{ matrix.target }}
          if-no-files-found: error

  build-web-package:
    name: Package web
    needs: changelog
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore playground WASM cache
        id: playground-wasm-cache
        uses: actions/cache/restore@v4
        with:
          path: playground/public/wasm
          key: playground-wasm-${{ runner.os }}-${{ env.EMSDK_VERSION }}-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'build.rs', 'rust-toolchain.toml', 'src/**', 'crates/**', 'playground/scripts/build-vide-wasm.mjs', 'playground/scripts/script-utils.mjs', '.github/actions/setup-emscripten/**', '.github/actions/setup-rust/**') }}

      - name: Verify cached playground WASM
        if: steps.playground-wasm-cache.outputs.cache-hit == 'true'
        working-directory: .
        run: |
          test -s playground/public/wasm/vide-lsp.js
          test -s playground/public/wasm/vide-core.js
          test -s playground/public/wasm/vide-core.wasm

      - name: Setup Rust
        if: steps.playground-wasm-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/setup-rust
        with:
          components: rustfmt

      - name: Setup sccache
        if: steps.playground-wasm-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/setup-sccache
        with:
          cmake-launcher: "true"

      - name: Rust Cache
        if: steps.playground-wasm-cache.outputs.cache-hit != 'true'
        uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          shared-key: release-web-wasm-${{ runner.os }}-${{ env.EMSDK_VERSION }}
          key: wasm-src-${{ hashFiles('Cargo.toml', 'Cargo.lock', 'build.rs', 'rust-toolchain.toml', 'src/**', 'crates/**', 'playground/scripts/build-vide-wasm.mjs', 'playground/scripts/script-utils.mjs', '.github/actions/setup-emscripten/**', '.github/actions/setup-rust/**') }}
          cache-workspace-crates: true
          cache-on-failure: true

      - name: Install Emscripten SDK
        if: steps.playground-wasm-cache.outputs.cache-hit != 'true'
        uses: ./.github/actions/setup-emscripten
        with:
          version: ${{ env.EMSDK_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install JS dependencies
        run: npm ci

      - name: Build playground WASM
        if: steps.playground-wasm-cache.outputs.cache-hit != 'true'
        working-directory: playground
        run: |
          source "${EMSDK}/emsdk_env.sh"
          npm run build:wasm

      - name: Save playground WASM cache
        if: steps.playground-wasm-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: playground/public/wasm
          key: ${{ steps.playground-wasm-cache.outputs.cache-primary-key }}

      - name: Set build metadata
        shell: bash
        working-directory: .
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "VIDE_EXTENSION_BUILD_KIND=beta" >> "$GITHUB_ENV"
            echo "VIDE_EXTENSION_COMMIT_HASH=$(git rev-parse --short "$GITHUB_SHA")" >> "$GITHUB_ENV"
            echo "VIDE_EXTENSION_BUILD_DATE=$(date -u +'%Y%m%dT%H%M%SZ')" >> "$GITHUB_ENV"
          else
            echo "VIDE_EXTENSION_BUILD_KIND=stable" >> "$GITHUB_ENV"
          fi

      - name: Build VSIX
        run: npm run package:vsix:web

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vide-vscode-${{ github.event_name == 'workflow_dispatch' && 'beta' || 'stable' }}-web
          path: editors/vscode/vide-vscode-web.vsix
          if-no-files-found: error

  publish:
    name: Publish ${{ github.event_name == 'workflow_dispatch' && 'beta' || 'stable' }} release
    needs: [build-and-package, build-linux-x64-package, build-alpine-package, build-web-package]
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && 'beta' || github.ref_name }}
      RELEASE_NAME: ${{ github.event_name == 'workflow_dispatch' && 'Vide beta' || format('Vide {0}', github.ref_name) }}
      RELEASE_PRERELEASE: ${{ github.event_name == 'workflow_dispatch' }}
      RELEASE_MAKE_LATEST: ${{ github.event_name == 'workflow_dispatch' && 'false' || 'true' }}
    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4

      - name: Move beta tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f beta "$GITHUB_SHA"
          git push -f origin beta

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Setup Node
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install docs dependencies
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: npm --prefix docs ci

      - name: Prepare stable release body
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: node docs/scripts/release-body-from-changelog.mjs --tag "$RELEASE_TAG" --output release-body.md

      - name: Publish stable release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          prerelease: ${{ env.RELEASE_PRERELEASE }}
          make_latest: ${{ env.RELEASE_MAKE_LATEST }}
          body_path: release-body.md
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            artifacts/**/*.vsix
            artifacts/vide-lsp-*/**

      - name: Publish beta release
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          prerelease: ${{ env.RELEASE_PRERELEASE }}
          make_latest: ${{ env.RELEASE_MAKE_LATEST }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: true
          files: |
            artifacts/**/*.vsix
            artifacts/vide-lsp-*/**

  publish-marketplace:
    name: Publish VS Code Marketplace
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [build-and-package, build-linux-x64-package, build-web-package, publish]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install JS dependencies
        run: npm ci

      - name: Download VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish VSIX packages
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${VSCE_PAT:-}" ]]; then
            echo "VSCE_PAT secret is not set; cannot publish to VS Code Marketplace." >&2
            exit 1
          fi

          shopt -s globstar nullglob
          vsixes=(../../artifacts/**/*.vsix)
          if (( ${#vsixes[@]} == 0 )); then
            echo "No VSIX artifacts found to publish." >&2
            exit 1
          fi

          failed=()
          log_dir="${RUNNER_TEMP}/vsce-publish-logs"
          mkdir -p "${log_dir}"
          for vsix in "${vsixes[@]}"; do
            log_file="${log_dir}/$(basename "${vsix}").log"
            echo "::group::Publish ${vsix}"
            if node node_modules/@vscode/vsce/vsce publish --packagePath "$vsix" 2>&1 | tee "${log_file}"; then
              echo "Published ${vsix}"
            else
              status=$?
              echo "::error::Failed to publish ${vsix} with exit code ${status}"
              failed+=("${vsix}|${status}|${log_file}")
            fi
            echo "::endgroup::"
          done

          if (( ${#failed[@]} > 0 )); then
            {
              echo "## VS Code Marketplace publish failures"
              echo
              echo "Failed to publish ${#failed[@]} VSIX package(s)."
              echo
            } >> "${GITHUB_STEP_SUMMARY}"

            echo "Failed to publish ${#failed[@]} VSIX package(s):" >&2
            for item in "${failed[@]}"; do
              IFS='|' read -r vsix status log_file <<< "${item}"
              echo "  ${vsix} (exit ${status})" >&2
              {
                echo "### ${vsix}"
                echo
                echo "Exit code: ${status}"
                echo
                echo '```text'
                tail -n 80 "${log_file}" || true
                echo '```'
                echo
              } >> "${GITHUB_STEP_SUMMARY}"
            done
            exit 1
          fi

  publish-openvsx:
    name: Publish Open VSX ${{ matrix.target }}
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: publish
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - linux-x64
          - linux-arm64
          - win32-x64
          - darwin-arm64
          - alpine-x64
          - alpine-arm64
          - web
    steps:
      - name: Download VSIX artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Require Open VSX token
        env:
          OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
        run: |
          if [ -z "${OPEN_VSX_TOKEN:-}" ]; then
            echo "OPEN_VSX_TOKEN secret is not set; cannot publish to Open VSX." >&2
            exit 1
          fi

      - name: Publish VSIX package to Open VSX
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: ${{ secrets.OPEN_VSX_TOKEN }}
          extensionFile: artifacts/vide-vscode-stable-${{ matrix.target }}/vide-vscode-${{ matrix.target }}.vsix
